<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBox Visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>BBox Visualizer</h2>
            
            <div class="form-group">
                <label>Upload Image:</label>
                <input type="file" id="imageUpload" accept="image/*">
            </div>

            <div class="form-group">
                <label>Scale:</label>
                <select id="scaleSelect">
                    <option value="absolute">Absolute (Pixels)</option>
                    <option value="normalized">Normalized (0-1)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Format:</label>
                <select id="formatSelect">
                    <option value="xyxy">xyxy (MinMax)</option>
                    <option value="xywh">xywh (Top-Left)</option>
                    <option value="cxcywh">cxcywh (Center)</option>
                </select>
            </div>

            <div class="coord-inputs">
                <div class="form-group">
                    <label id="lbl1">x1:</label>
                    <input type="number" id="val1" step="any" value="0">
                </div>
                <div class="form-group">
                    <label id="lbl2">y1:</label>
                    <input type="number" id="val2" step="any" value="0">
                </div>
                <div class="form-group">
                    <label id="lbl3">x2:</label>
                    <input type="number" id="val3" step="any" value="0">
                </div>
                <div class="form-group">
                    <label id="lbl4">y2:</label>
                    <input type="number" id="val4" step="any" value="0">
                </div>
            </div>

            <p id="imageInfo" class="info-text">Image Size: N/A</p>
        </div>

        <div class="main-content">
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
