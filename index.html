<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBox Visualizer & IoU Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>BBox Visualizer</h2>
                <button id="closeSidebar" class="icon-btn" title="Close Sidebar">✖</button>
            </div>
            
            <div class="iou-display">
                IoU: <span id="iouValue">0.0000</span>
            </div>

            <div class="form-group">
                <label>Upload Image:</label>
                <input type="file" id="imageUpload" accept="image/*">
            </div>

            <div class="form-group">
                <label>Zoom:</label>
                <div class="zoom-controls">
                    <button id="btnZoomOut" class="btn-icon">-</button>
                    <span id="zoomLabel">100%</span>
                    <button id="btnZoomIn" class="btn-icon">+</button>
                    <button id="btnZoomReset">Fit</button>
                </div>
            </div>

            <hr>

            <h3 class="box-title green-text">Box 1 (Ground Truth)</h3>
            <div class="box-config">
                <div class="config-row-2">
                    <select id="scaleSelect1">
                        <option value="absolute">Absolute (Pixels)</option>
                        <option value="normalized">Normalized (0-1)</option>
                    </select>
                    <select id="formatSelect1">
                        <option value="xyxy">xyxy</option>
                        <option value="xywh">xywh</option>
                        <option value="cxcywh">cxcywh (Center)</option>
                    </select>
                </div>
                <div class="style-sliders">
                    <div class="slider-group">
                        <label>Border: <span id="valThickness1">2</span>px</label>
                        <input type="range" id="borderThickness1" min="1" max="15" value="2">
                    </div>
                    <div class="slider-group">
                        <label>Fill: <span id="valOpacity1">0.2</span></label>
                        <input type="range" id="fillOpacity1" min="0" max="1" step="0.05" value="0.2">
                    </div>
                </div>
            </div>
            
            <div class="coord-inputs">
                <div class="form-group"><label id="lbl1">x1:</label><input type="number" id="val1" step="any" value="0"></div>
                <div class="form-group"><label id="lbl2">y1:</label><input type="number" id="val2" step="any" value="0"></div>
                <div class="form-group"><label id="lbl3">x2:</label><input type="number" id="val3" step="any" value="0"></div>
                <div class="form-group"><label id="lbl4">y2:</label><input type="number" id="val4" step="any" value="0"></div>
            </div>

            <hr>

            <h3 class="box-title blue-text">Box 2 (Prediction)</h3>
            <div class="box-config">
                <div class="config-row-2">
                    <select id="scaleSelect2">
                        <option value="absolute">Absolute (Pixels)</option>
                        <option value="normalized">Normalized (0-1)</option>
                    </select>
                    <select id="formatSelect2">
                        <option value="xyxy">xyxy</option>
                        <option value="xywh">xywh</option>
                        <option value="cxcywh">cxcywh (Center)</option>
                    </select>
                </div>
                <div class="style-sliders">
                    <div class="slider-group">
                        <label>Border: <span id="valThickness2">2</span>px</label>
                        <input type="range" id="borderThickness2" min="1" max="15" value="2">
                    </div>
                    <div class="slider-group">
                        <label>Fill: <span id="valOpacity2">0.2</span></label>
                        <input type="range" id="fillOpacity2" min="0" max="1" step="0.05" value="0.2">
                    </div>
                </div>
            </div>

            <div class="coord-inputs">
                <div class="form-group"><label id="lbl5">x1:</label><input type="number" id="val5" step="any" value="0"></div>
                <div class="form-group"><label id="lbl6">y1:</label><input type="number" id="val6" step="any" value="0"></div>
                <div class="form-group"><label id="lbl7">x2:</label><input type="number" id="val7" step="any" value="0"></div>
                <div class="form-group"><label id="lbl8">y2:</label><input type="number" id="val8" step="any" value="0"></div>
            </div>

            <p id="imageInfo" class="info-text">Image Size: N/A</p>
        </div>

        <div class="main-content">
            <button id="openSidebar" class="floating-btn" title="Open Menu">☰</button>
            <div class="canvas-container" id="canvasContainer">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
